services:
  postgres:
    image: postgres:16-alpine
    container_name: escola-postgres-dev
    environment:
      POSTGRES_USER: escola
      POSTGRES_PASSWORD: escola
      POSTGRES_DB: escola
    ports:
      - '5433:5432'
    volumes:
      - escola_pgdata_dev:/var/lib/postgresql/data

volumes:
  escola_pgdata_dev:
