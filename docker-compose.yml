services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-escola}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-escola}
    volumes:
      - escola_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-escola}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-escola}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-escola}?connection_limit=5
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      PORT: 3001
      NODE_ENV: production
    volumes:
      - escola_uploads:/app/apps/api/uploads
    ports:
      - '127.0.0.1:3001:3001'
    mem_limit: 384m

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  escola_pgdata:
  escola_uploads:
