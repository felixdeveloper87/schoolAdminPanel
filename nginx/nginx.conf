worker_processes 1;

events {
  worker_connections 512;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  client_max_body_size 5m;

  # Web agora roda na Vercel; a VPS só expõe a API pública via HTTPS.
  # O Next.js (Vercel) fala com esta API servidor-a-servidor, então não há
  # CORS/cookie cross-site envolvido no navegador.
  server {
    listen 80;
    server_name api.91-98-88-120.sslip.io;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name api.91-98-88-120.sslip.io;

    ssl_certificate /etc/letsencrypt/live/api.91-98-88-120.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.91-98-88-120.sslip.io/privkey.pem;

    location /api/ {
      proxy_pass http://api:3002/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cookie_path / /;
    }
  }
}
